<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="520情人节 - 浪漫视频，为爱的人准备的感动时刻">
    <title>🎬 520 浪漫视频 | FOR HJH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-light: #ffeef8;
            --pink-main: #ff6b9d;
            --pink-deep: #c44569;
            --rose-gold: #e8b4b8;
            --purple-soft: #a855f7;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--rose-gold) 50%, var(--pink-main) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(196, 69, 105, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: var(--pink-deep);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--pink-main);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(196, 69, 105, 0.3);
        }

        .nav-link.active {
            background: var(--pink-main);
            color: white;
        }

        .main-container {
            max-width: 1100px;
            margin: 120px auto 50px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .video-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .video-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .video-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .video-subtitle {
            color: var(--rose-gold);
            font-size: 1.2rem;
        }

        .video-wrapper {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 30px 60px -12px rgba(196, 69, 105, 0.3);
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
        }

        #loveAnimationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .video-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.5);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(196, 69, 105, 0.6);
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 2rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-wrapper:hover .video-controls,
        .video-controls.show {
            opacity: 1;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-main), var(--purple-soft));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .control-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .control-left, .control-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .volume-slider {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 70%;
        }

        .time-display {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .video-info {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.1);
        }

        .info-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--pink-deep);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-text {
            color: #666;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .video-tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .tip-card {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.05), rgba(168, 85, 247, 0.05));
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(196, 69, 105, 0.1);
            transition: all 0.3s ease;
        }

        .tip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.1);
        }

        .tip-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .tip-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--pink-deep);
            margin-bottom: 0.5rem;
        }

        .tip-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
            color: white;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--pink-deep);
            border: 2px solid var(--pink-main);
        }

        .btn-secondary:hover {
            background: var(--pink-light);
            transform: translateY(-3px);
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: floatHeart 8s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem;
            color: rgba(196, 69, 105, 0.7);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .nav-container {
                justify-content: center;
            }

            .nav-links {
                gap: 0.5rem;
            }

            .nav-link {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }

            .main-container {
                padding: 1rem;
                margin-top: 120px;
            }

            .video-title {
                font-size: 2rem;
            }

            .video-controls {
                padding: 1rem;
            }

            .control-btn {
                font-size: 1.2rem;
            }

            .volume-slider {
                width: 60px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <script>
        const canvas = document.getElementById('loveAnimationCanvas');
        const ctx = canvas.getContext('2d');
        const playButton = document.getElementById('playButton');
        const videoOverlay = document.getElementById('videoOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');

        let animationId;
        let startTime;
        let hearts = [];
        let particles = [];
        let isPlaying = false;

        class Heart {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = 20 + Math.random() * 30;
                this.speedY = -1.5 - Math.random() * 2;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.opacity = 0.6 + Math.random() * 0.4;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.03 + Math.random() * 0.03;
                this.emoji = ['💕', '💖', '💗', '💝', '❤️', '💘', '💓'][Math.floor(Math.random() * 7)];
            }

            update() {
                this.y += this.speedY;
                this.x += Math.sin(this.y * 0.01) * 0.8 + this.speedX;
                this.rotation += this.rotationSpeed;
                this.pulse += this.pulseSpeed;

                if (this.y < -100) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;

                const scale = 1 + Math.sin(this.pulse) * 0.15;
                ctx.font = `${this.size * scale}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);

                ctx.restore();
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 2 + Math.random() * 5;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.speedY = Math.random() * 0.8 - 0.4;
                this.opacity = 0.3 + Math.random() * 0.5;
                this.life = 0;
                this.maxLife = 150 + Math.random() * 200;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life++;

                if (this.life > this.maxLife) {
                    this.reset();
                }

                this.opacity = Math.sin((this.life / this.maxLife) * Math.PI) * 0.6;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 107, 157, ${this.opacity})`;
                ctx.fill();
            }
        }

        function drawBackground(time) {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            const hue = (time / 50) % 360;
            
            gradient.addColorStop(0, `hsl(${330 + Math.sin(time / 2000) * 20}, 100%, 95%)`);
            gradient.addColorStop(0.5, `hsl(${340 + Math.sin(time / 2000) * 20}, 80%, 85%)`);
            gradient.addColorStop(1, `hsl(${350 + Math.sin(time / 2000) * 20}, 100%, 75%)`);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function draw520(time) {
            const progress = (time % 8000) / 8000;
            const scale = 1 + Math.sin(progress * Math.PI * 2) * 0.15;
            const opacity = 0.4 + Math.sin(progress * Math.PI * 2) * 0.2;

            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(scale, scale);

            ctx.font = "bold 180px Arial";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = '#c44569';
            ctx.shadowBlur = 50;
            
            const gradient = ctx.createLinearGradient(-150, -90, 150, 90);
            gradient.addColorStop(0, '#c44569');
            gradient.addColorStop(0.5, '#ff6b9d');
            gradient.addColorStop(1, '#a855f7');
            ctx.fillStyle = gradient;
            
            ctx.fillText('520', 0, 0);
            ctx.restore();
        }

        function drawLoveText(time) {
            const messages = [
                '💕 我爱你 Forever',
                '💖 永远在一起',
                '💗 你是我的唯一',
                '💝 520 Happy',
                '❤️ Love You',
                '💘 情有独钟'
            ];

            const index = Math.floor((time / 2500) % messages.length);
            const opacity = 0.9 + Math.sin(time / 600) * 0.1;

            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.font = "bold 48px Arial";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const gradient = ctx.createLinearGradient(
                canvas.width / 2 - 250,
                canvas.height - 120,
                canvas.width / 2 + 250,
                canvas.height - 60
            );
            gradient.addColorStop(0, '#c44569');
            gradient.addColorStop(1, '#a855f7');
            ctx.fillStyle = gradient;

            ctx.shadowColor = '#ff6b9d';
            ctx.shadowBlur = 30;
            ctx.fillText(messages[index], canvas.width / 2, canvas.height - 90);
            ctx.restore();
        }

        function drawHeart(time) {
            const scale = 1 + Math.sin(time / 400) * 0.2;
            const pulse = Math.sin(time / 250) * 8;

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2 - 50);
            ctx.scale(scale, scale);

            ctx.font = "150px Arial";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = '#ff6b9d';
            ctx.shadowBlur = 60 + pulse;
            
            ctx.fillText('❤️', 0, 0);
            ctx.restore();
        }

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const time = timestamp - startTime;

            drawBackground(time);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            hearts.forEach(h => {
                h.update();
                h.draw();
            });

            drawHeart(time);
            draw520(time);
            drawLoveText(time);

            if (isPlaying) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function togglePlay() {
            if (!isPlaying) {
                isPlaying = true;
                playButton.textContent = '⛶';
                playPauseBtn.textContent = '⏸️';
                videoOverlay.classList.add('hidden');
                startTime = 0;
                animate(0);
            } else {
                isPlaying = false;
                playButton.textContent = '▶️';
                playPauseBtn.textContent = '▶️';
                videoOverlay.classList.remove('hidden');
                cancelAnimationFrame(animationId);
            }
        }

        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💝', '❤️', '💘'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (8 + Math.random() * 4) + 's';
                heart.style.fontSize = (1 + Math.random() * 2) + 'rem';
                container.appendChild(heart);
            }
        }

        function init() {
            for (let i = 0; i < 25; i++) {
                hearts.push(new Heart());
            }

            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }

            createFloatingHearts();
            
            playButton.addEventListener('click', togglePlay);
            canvas.addEventListener('click', togglePlay);
            playPauseBtn.addEventListener('click', togglePlay);
            
            animate(0);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
