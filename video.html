<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="520情人节 - 浪漫视频，为爱的人准备的感动时刻">
    <title>🎬 520 浪漫视频 | FOR HJH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-light: #ffeef8;
            --pink-main: #ff6b9d;
            --pink-deep: #c44569;
            --rose-gold: #e8b4b8;
            --purple-soft: #a855f7;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--rose-gold) 50%, var(--pink-main) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(196, 69, 105, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: var(--pink-deep);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--pink-main);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(196, 69, 105, 0.3);
        }

        .nav-link.active {
            background: var(--pink-main);
            color: white;
        }

        .main-container {
            max-width: 1100px;
            margin: 120px auto 50px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .video-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .video-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .video-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .video-subtitle {
            color: var(--rose-gold);
            font-size: 1.2rem;
        }

        .video-wrapper {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 30px 60px -12px rgba(196, 69, 105, 0.3);
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .video-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.5);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(196, 69, 105, 0.6);
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 2rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-wrapper:hover .video-controls,
        .video-controls.show {
            opacity: 1;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-main), var(--purple-soft));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .control-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .control-left, .control-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .volume-slider {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 70%;
        }

        .time-display {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .video-info {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.1);
        }

        .info-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--pink-deep);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-text {
            color: #666;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .video-tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .tip-card {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.05), rgba(168, 85, 247, 0.05));
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(196, 69, 105, 0.1);
            transition: all 0.3s ease;
        }

        .tip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.1);
        }

        .tip-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .tip-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--pink-deep);
            margin-bottom: 0.5rem;
        }

        .tip-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
            color: white;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--pink-deep);
            border: 2px solid var(--pink-main);
        }

        .btn-secondary:hover {
            background: var(--pink-light);
            transform: translateY(-3px);
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: floatHeart 8s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem;
            color: rgba(196, 69, 105, 0.7);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .nav-container {
                justify-content: center;
            }

            .nav-links {
                gap: 0.5rem;
            }

            .nav-link {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }

            .main-container {
                padding: 1rem;
                margin-top: 120px;
            }

            .video-title {
                font-size: 2rem;
            }

            .video-controls {
                padding: 1rem;
            }

            .control-btn {
                font-size: 1.2rem;
            }

            .volume-slider {
                width: 60px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">💕 520 爱的时光</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="love.html" class="nav-link">💌 表白</a>

    <main class="main-container">

        </div>

        <div class="video-wrapper">

                <video id="loveVideo" poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 1080'%3E%3Crect fill='%231a1a2e' width='1920' height='1080'/%3E%3Ctext fill='%23ff6b9d' font-family='Arial' font-size='80' x='50%25' y='50%25' text-anchor='middle' dominant-baseline='middle'%3E💕%3C/text%3E%3C/svg%3E">
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
                    您的浏览器不支持 HTML5 视频。
                </video>
                
                <div class="video-overlay" id="videoOverlay">
                    <button class="play-button" id="playButton">▶️</button>
                </div>
                
                <div class="video-controls" id="videoControls">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>

                            <button class="control-btn" id="playPauseBtn">▶️</button>

                                <div class="volume-fill" id="volumeFill"></div>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="video-info">
            <h2 class="info-title">💝 关于这个视频</h2>
            <p class="info-text">
                这是一段为你精心准备的520主题视频。每一个画面都承载着我们共同的回忆，每一帧都诉说着我对你的爱意。
                无论时间如何流逝，这份感动永远属于我们。
            </p>

            <div class="video-tips">
                <div class="tip-card">

                <div class="tip-card">
                    <span class="tip-icon">💕</span>
                    <h3 class="tip-title">专属定制</h3>
                    <p class="tip-desc">可以替换成你们自己的视频，记录每一个珍贵瞬间</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <a href="love.html" class="btn btn-primary">

            <a href="gallery.html" class="btn btn-secondary">

        </div>

        <div class="footer">

    </main>

    <script>
        const video = document.getElementById('loveVideo');
        const playButton = document.getElementById('playButton');
        const videoOverlay = document.getElementById('videoOverlay');
        const videoControls = document.getElementById('videoControls');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const volumeBar = document.getElementById('volumeBar');
        const volumeFill = document.getElementById('volumeFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💝', '❤️', '💘'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (8 + Math.random() * 4) + 's';
                heart.style.fontSize = (1 + Math.random() * 2) + 'rem';
                container.appendChild(heart);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playButton.textContent = '⏸️';
                playPauseBtn.textContent = '⏸️';
                videoOverlay.classList.add('hidden');
            } else {
                video.pause();
                playButton.textContent = '▶️';
                playPauseBtn.textContent = '▶️';
                videoOverlay.classList.remove('hidden');
            }
        }

        function updateProgress() {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }

        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            video.currentTime = percent * video.duration;
        }

        function setVolume(e) {
            const rect = volumeBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            video.volume = Math.max(0, Math.min(1, percent));
            volumeFill.style.width = (video.volume * 100) + '%';
            
            if (video.volume === 0) {
                muteBtn.textContent = '🔇';
            } else if (video.volume < 0.5) {
                muteBtn.textContent = '🔉';
            } else {
                muteBtn.textContent = '🔊';
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            if (video.muted) {
                muteBtn.textContent = '🔇';
                volumeFill.style.width = '0%';
            } else {
                muteBtn.textContent = '🔊';
                volumeFill.style.width = (video.volume * 100) + '%';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                video.parentElement.parentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function init() {
            createFloatingHearts();
            
            playButton.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);
            video.addEventListener('timeupdate', updateProgress);
            progressBar.addEventListener('click', setProgress);
            volumeBar.addEventListener('click', setVolume);
            muteBtn.addEventListener('click', toggleMute);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            playPauseBtn.addEventListener('click', togglePlay);
            
            video.addEventListener('ended', () => {
                playButton.textContent = '▶️';
                playPauseBtn.textContent = '▶️';
                videoOverlay.classList.remove('hidden');
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
