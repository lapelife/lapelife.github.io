<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="520情人节专属 - 浪漫时光笺，为爱的人准备的惊喜">
    <title>💕 520 爱的时光笺 | FOR HJH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-light: #ffeef8;
            --pink-main: #ff6b9d;
            --pink-deep: #c44569;
            --rose-gold: #e8b4b8;
            --purple-soft: #a855f7;
            --white-cream: #fffbfc;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--rose-gold) 50%, var(--pink-main) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(196, 69, 105, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: var(--pink-deep);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            background: var(--pink-main);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(196, 69, 105, 0.3);
        }

        .nav-link.active {
            background: var(--pink-main);
            color: white;
        }

        /* 主容器 */
        .main-container {
            max-width: 700px;
            margin: 100px auto 50px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        /* 爱心卡片 */
        .love-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(196, 69, 105, 0.25);
            border: 2px solid rgba(255, 107, 157, 0.2);
            position: relative;
            overflow: hidden;
        }

        .love-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 标题区 */
        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .heart-icon {
            font-size: 4rem;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: block;
            margin-bottom: 1rem;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(120deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--pink-deep);
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* 日期时钟区 */
        .datetime-section {
            background: linear-gradient(135deg, var(--pink-light), rgba(255, 107, 157, 0.1));
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(196, 69, 105, 0.1);
        }

        .date-display {
            font-size: 1.2rem;
            color: var(--pink-deep);
            margin-bottom: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .time-display {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(145deg, var(--pink-deep), var(--purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
        }

        .seconds {
            font-size: 2rem;
            font-weight: 500;
            color: var(--pink-main);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* 名言区 */
        .quote-section {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.05), rgba(196, 69, 105, 0.05));
            border-radius: 2rem;
            padding: 2rem;
            margin: 2rem 0;
            border-left: 4px solid var(--pink-main);
            position: relative;
        }

        .quote-text {
            font-size: 1.4rem;
            line-height: 1.6;
            color: var(--pink-deep);
            margin-bottom: 1rem;
            font-weight: 500;
            quotes: "“" "”";
        }

        .quote-text::before {
            content: open-quote;
            font-size: 3rem;
            color: var(--pink-main);
            opacity: 0.3;
            position: absolute;
            top: 0.5rem;
            left: 1rem;
        }

        .quote-author {
            text-align: right;
            font-size: 1rem;
            color: var(--rose-gold);
            font-style: normal;
            margin-top: 1rem;
        }

        .quote-author::before {
            content: '—— ';
            opacity: 0.7;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-main), var(--pink-deep));
            color: white;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(196, 69, 105, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--pink-deep);
            border: 2px solid var(--pink-main);
        }

        .btn-secondary:hover {
            background: var(--pink-light);
            transform: translateY(-3px);
        }

        /* 导航卡片 */
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .nav-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--pink-main), var(--purple-soft));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .nav-card:hover::before {
            transform: scaleX(1);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(196, 69, 105, 0.2);
            border-color: rgba(196, 69, 105, 0.2);
        }

        .nav-card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .nav-card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--pink-deep);
            margin-bottom: 0.5rem;
        }

        .nav-card-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        /* 浮动爱心 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: floatHeart 8s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat 10s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem;
            color: rgba(196, 69, 105, 0.7);
            font-size: 0.9rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-container {
                justify-content: center;
            }

            .nav-links {
                gap: 0.5rem;
            }

            .nav-link {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }

            .main-container {
                padding: 1rem;
                margin-top: 120px;
            }

            .love-card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }

            .main-title {
                font-size: 1.8rem;
            }

            .time-display {
                font-size: 2.5rem;
            }

            .seconds {
                font-size: 1.5rem;
            }

            .quote-text {
                font-size: 1.2rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 动画 */
        @keyframes gentleFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: gentleFade 0.6s ease forwards;
        }

        .quote-section {
            animation: gentleFade 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <!-- 浮动爱心 -->
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <!-- 粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">💕 520 爱的时光</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">🏠 首页</a>
                <a href="love.html" class="nav-link">💌 表白</a>
                <a href="video.html" class="nav-link">🎬 视频</a>
                <a href="gallery.html" class="nav-link">📸 相册</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-container">
        <div class="love-card fade-in">
            <div class="card-header">
                <span class="heart-icon">💖</span>
                <h1 class="main-title">520 爱的时光笺</h1>
                <p class="subtitle">为 HJH 准备的专属浪漫</p>
            </div>

            <!-- 日期时钟 -->
            <div class="datetime-section">
                <div class="date-display" id="dateDisplay">加载中...</div>
                <div class="time-display">
                    <span id="timeDisplay">--:--</span>
                    <span class="seconds" id="secondsDisplay">--</span>
                </div>
            </div>

            <!-- 名言 -->
            <div class="quote-section" id="quoteSection">
                <p class="quote-text" id="quoteText">心中有景，花香满径。</p>
                <p class="quote-author" id="quoteAuthor">佚名</p>
            </div>

            <!-- 按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" id="refreshQuoteBtn">
                    🔄 换一句情话
                </button>
                <a href="love.html" class="btn btn-secondary">
                    💌 去表白 →
                </a>
            </div>

            <!-- 页面导航卡片 -->
            <div class="nav-cards">
                <a href="love.html" class="nav-card">
                    <span class="nav-card-icon">💌</span>
                    <h3 class="nav-card-title">浪漫表白</h3>
                    <p class="nav-card-desc">用最美的语言，诉说心中的爱意</p>
                </a>
                <a href="video.html" class="nav-card">
                    <span class="nav-card-icon">🎬</span>
                    <h3 class="nav-card-title">520 视频</h3>
                    <p class="nav-card-desc">震撼心灵的视频，感动每一刻</p>
                </a>
                <a href="gallery.html" class="nav-card">
                    <span class="nav-card-icon">📸</span>
                    <h3 class="nav-card-title">甜蜜相册</h3>
                    <p class="nav-card-desc">记录每一个美好瞬间</p>
                </a>
            </div>
        </div>

        <div class="footer">
            💕 520情人节专属 | 用心制作 | FOR HJH
        </div>
    </main>

    <script>
        // 名言库
        const quotesLibrary = [
            { text: "520不是数字，是我藏在心底的告白。", author: "林徽因" },
            { text: "遇见你，是我生命中最美好的意外。", author: "张爱玲" },
            { text: "你是我眼中的星辰，照亮我前行的路。", author: "徐志摩" },
            { text: "与你在一起的每一天，都是情人节。", author: "三毛" },
            { text: "你是我生命中的阳光，温暖我所有的寒冬。", author: "冰心" },
            { text: "爱情不是轰轰烈烈的誓言，而是平平淡淡的陪伴。", author: "周国平" },
            { text: "我爱你，不是因为你是谁，而是因为和你在一起时我是谁。", author: "泰戈尔" },
            { text: "你是我心之所向，也是我命之所归。", author: "席慕蓉" },
            { text: "陪伴是最长情的告白，相守是最温暖的承诺。", author: "余秋雨" },
            { text: "你是我生命中的唯一，无可替代。", author: "汪国真" },
            { text: "你是我今生最美的遇见，也是我来世最想重逢的人。", author: "白落梅" },
            { text: "你的名字，是我听过最美的情话。", author: "顾城" },
            { text: "你是我心中的白月光，也是我眼中的朱砂痣。", author: "张爱玲" },
            { text: "遇见你，是我这辈子最幸运的事。", author: "林清玄" },
            { text: "你是我生命中的彩虹，让我的世界变得五彩斑斓。", author: "毕淑敏" },
            { text: "和你在一起，每一天都是新的开始。", author: "安妮宝贝" },
            { text: "你是我灵魂的伴侣，也是我生命的归宿。", author: "林徽因" },
            { text: "你的拥抱，是我最温暖的港湾。", author: "徐志摩" },
            { text: "遇见你，是我生命中最美好的缘分。", author: "三毛" },
            { text: "你是我眼中的唯一，也是我心中的永恒。", author: "冰心" },
            { text: "和你在一起，就是我想要的幸福。", author: "周国平" },
            { text: "爱是生命中最美的诗，而你是诗中最动人的韵脚。", author: "泰戈尔" },
            { text: "在茫茫人海中，我只看到了你。", author: "席慕蓉" },
            { text: "你的微笑，是我每天醒来的动力。", author: "余秋雨" },
            { text: "爱情是两个人的舞蹈，需要彼此的默契配合。", author: "汪国真" },
            { text: "爱是相互理解，相互包容，相互扶持。", author: "白落梅" },
            { text: "爱一个人，就要接受他的全部，包括他的缺点。", author: "顾城" },
            { text: "爱情不是占有，而是成全。", author: "林清玄" },
            { text: "爱是一种感觉，一种默契，一种心有灵犀。", author: "毕淑敏" },
            { text: "爱情需要经营，需要呵护，需要用心去浇灌。", author: "安妮宝贝" }
        ];

        // DOM 元素
        const quoteTextEl = document.getElementById('quoteText');
        const quoteAuthorEl = document.getElementById('quoteAuthor');
        const quoteSection = document.getElementById('quoteSection');
        const refreshBtn = document.getElementById('refreshQuoteBtn');
        const dateDisplayEl = document.getElementById('dateDisplay');
        const timeDisplayEl = document.getElementById('timeDisplay');
        const secondsDisplayEl = document.getElementById('secondsDisplay');

        // 随机名言
        function getRandomQuote() {
            return quotesLibrary[Math.floor(Math.random() * quotesLibrary.length)];
        }

        function updateQuote() {
            const quote = getRandomQuote();
            
            quoteTextEl.style.opacity = '0';
            quoteAuthorEl.style.opacity = '0';
            
            setTimeout(() => {
                quoteTextEl.textContent = quote.text;
                quoteAuthorEl.textContent = quote.author;
                
                quoteTextEl.style.transition = 'opacity 0.6s ease';
                quoteAuthorEl.style.transition = 'opacity 0.6s ease';
                quoteTextEl.style.opacity = '1';
                quoteAuthorEl.style.opacity = '1';
            }, 300);
        }

        // 日期时间
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
        }

        function updateDateTime() {
            const now = new Date();
            dateDisplayEl.textContent = formatDate(now);
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            timeDisplayEl.textContent = `${hours}:${minutes}`;
            secondsDisplayEl.textContent = seconds;
        }

        // 浮动爱心
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💝', '❤️', '💘'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (8 + Math.random() * 4) + 's';
                heart.style.fontSize = (1 + Math.random() * 2) + 'rem';
                container.appendChild(heart);
            }
        }

        // 粒子效果
        function createParticles() {
            const container = document.getElementById('particles');
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 5) + 's';
                particle.style.width = (4 + Math.random() * 6) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // 初始化
        function init() {
            // 随机名言
            const initQuote = getRandomQuote();
            quoteTextEl.textContent = initQuote.text;
            quoteAuthorEl.textContent = initQuote.author;

            // 时钟
            updateDateTime();
            setInterval(updateDateTime, 1000);

            // 刷新名言
            refreshBtn.addEventListener('click', updateQuote);

            // 浮动效果
            createFloatingHearts();
            createParticles();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
